<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Education Album • Horizon</title>
  <link rel="stylesheet" href="base.css">
  <link rel="icon" type="image/svg+xml" href="/Portfolio/Fav-Icon/Icon.svg">
  <style>
    .album-count {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem; color: var(--electric);
      letter-spacing: 0.15em; margin-top: 0.5rem;
    }
  </style>
</head>
<body>

  <nav class="site-nav">
    <a href="Homepage.html">Home</a>
    <a href="Personal.html">Personal</a>
    <a href="Collection.html">Collection</a>
    <a href="Family-background.html">Family</a>
    <a href="Education.html" class="active">Education</a>
  </nav>

  <!-- LOGOUT -->
  <button class="logout-btn" id="logoutBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
      <polyline points="16 17 21 12 16 7"/>
      <line x1="21" y1="12" x2="9" y2="12"/>
    </svg>
    Sign out
  </button>

  <div class="album-header">
    <h1>Education <em>Album</em></h1>
    <div class="album-count">15 photos · School memories</div>
  </div>

  <div class="photo-grid">
    <img src="Education/e1.jpg" alt="Education 1">
    <img src="Education/e2.jpg" alt="Education 2">
    <img src="Education/e3.jpg" alt="Education 3">
    <img src="Education/e4.jpg" alt="Education 4">
    <img src="Education/e5.jpg" alt="Education 5">
    <img src="Education/e6.jpg" alt="Education 6">
    <img src="Education/e7.jpg" alt="Education 7">
    <img src="Education/e8.jpg" alt="Education 8">
    <img src="Education/e9.jpg" alt="Education 9">
    <img src="Education/e10.jpg" alt="Education 10">
    <img src="Education/e11.jpg" alt="Education 11">
    <img src="Education/e12.jpg" alt="Education 12">
    <img src="Education/e13.jpg" alt="Education 13">
    <img src="Education/e14.jpg" alt="Education 14">
    <img src="Education/e15.jpg" alt="Education 15">
  </div>

  <div style="text-align:center; padding-bottom: 80px;">
    <a href="Education.html" class="back-link">Back to Education</a>
  </div>
  <script>
    document.getElementById('logoutBtn').addEventListener('click', function () {
      // Animate out
      this.textContent = 'Signing out…';
      this.style.pointerEvents = 'none';
      this.style.opacity = '0.5';

      setTimeout(() => {
        window.location.href = 'index.html';
      }, 700);
    });
  </script>
</body>
</html>
