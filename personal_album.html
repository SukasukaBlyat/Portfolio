<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Album • Horizon</title>
  <link rel="stylesheet" href="base.css">
  <link rel="icon" type="image/svg+xml" href="/Portfolio/Fav-Icon/Icon.svg">
  <style>
    .album-count {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem; color: var(--electric);
      letter-spacing: 0.15em; margin-top: 0.5rem;
    }
  </style>
</head>
<body>

  <nav class="site-nav">
    <a href="Homepage.html">Home</a>
    <a href="Personal.html" class="active">Personal</a>
    <a href="Collection.html">Collection</a>
    <a href="Family-background.html">Family</a>
    <a href="Education.html">Education</a>
  </nav>

  <!-- LOGOUT -->
  <button class="logout-btn" id="logoutBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
      <polyline points="16 17 21 12 16 7"/>
      <line x1="21" y1="12" x2="9" y2="12"/>
    </svg>
    Sign out
  </button>

  <div class="album-header">
    <h1>Personal <em>Album</em></h1>
    <div class="album-count">16 photos · A glimpse into my life</div>
  </div>

  <div class="photo-grid">
    <img src="Personal/p1.jpg" alt="Personal 1">
    <img src="Personal/p2.jpg" alt="Personal 2">
    <img src="Personal/p3.jpg" alt="Personal 3">
    <img src="Personal/p4.jpg" alt="Personal 4">
    <img src="Personal/p5.jpg" alt="Personal 5">
    <img src="Personal/p6.jpg" alt="Personal 6">
    <img src="Personal/p7.jpg" alt="Personal 7">
    <img src="Personal/p8.jpg" alt="Personal 8">
    <img src="Personal/p9.jpg" alt="Personal 9">
    <img src="Personal/p10.jpg" alt="Personal 10">
    <img src="Personal/p11.jpg" alt="Personal 11">
    <img src="Personal/p12.jpg" alt="Personal 12">
    <img src="Personal/p13.jpg" alt="Personal 13">
    <img src="Personal/p14.jpg" alt="Personal 14">
    <img src="Personal/p15.jpg" alt="Personal 15">
    <img src="Personal/p16.jpg" alt="Personal 16">
  </div>

  <div style="text-align:center; padding-bottom: 80px;">
    <a href="Homepage.html" class="back-link">Back to Home</a>
  </div>
  <script>
    document.getElementById('logoutBtn').addEventListener('click', function () {
      // Animate out
      this.textContent = 'Signing out…';
      this.style.pointerEvents = 'none';
      this.style.opacity = '0.5';

      setTimeout(() => {
        window.location.href = 'index.html';
      }, 700);
    });
  </script>
</body>
</html>
