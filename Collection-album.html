<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collection Album • Horizon</title>
  <link rel="stylesheet" href="base.css">
  <link rel="icon" type="image/svg+xml" href="/Portfolio/Fav-Icon/Icon.svg">
  <style>
    .album-count {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem; color: var(--electric);
      letter-spacing: 0.15em; margin-top: 0.5rem;
    }
  </style>
</head>
<body>

  <!-- CUSTOM CURSOR -->
  <div class="cursor-dot" id="cursor-dot"></div>
  <div class="cursor-glow" id="cursor-glow"></div>

  <nav class="site-nav">
    <a href="Homepage.html">Home</a>
    <a href="Personal.html">Personal</a>
    <a href="Collection.html" class="active">Collection</a>
    <a href="Family-background.html">Family</a>
    <a href="Education.html">Education</a>
  </nav>

  <!-- LOGOUT -->
  <button class="logout-btn" id="logoutBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
      <polyline points="16 17 21 12 16 7"/>
      <line x1="21" y1="12" x2="9" y2="12"/>
    </svg>
    Sign out
  </button>

  <div class="album-header">
    <h1>Collection <em>Album</em></h1>
    <div class="album-count">16 photos · Hobbies & Interests</div>
  </div>

  <div class="photo-grid">
    <img src="Personal/p1.jpg" alt="Collection 1">
    <img src="Personal/p2.jpg" alt="Collection 2">
    <img src="Personal/p3.jpg" alt="Collection 3">
    <img src="Personal/p4.jpg" alt="Collection 4">
    <img src="Personal/p5.jpg" alt="Collection 5">
    <img src="Personal/p6.jpg" alt="Collection 6">
    <img src="Personal/p7.jpg" alt="Collection 7">
    <img src="Personal/p8.jpg" alt="Collection 8">
    <img src="Personal/p9.jpg" alt="Collection 9">
    <img src="Personal/p10.jpg" alt="Collection 10">
    <img src="Personal/p11.jpg" alt="Collection 11">
    <img src="Personal/p12.jpg" alt="Collection 12">
    <img src="Personal/p13.jpg" alt="Collection 13">
    <img src="Personal/p14.jpg" alt="Collection 14">
    <img src="Personal/p15.jpg" alt="Collection 15">
    <img src="Personal/p16.jpg" alt="Collection 16">
  </div>

  <div style="text-align:center; padding-bottom: 80px;">
    <a href="Collection.html" class="back-link">Back to Collection</a>
  </div>
  <script>
    // ── CUSTOM CURSOR ──
    const dot = document.getElementById('cursor-dot');
    const glow = document.getElementById('cursor-glow');
    let mx = 0, my = 0, gx = 0, gy = 0;

    document.addEventListener('mousemove', (e) => {
      mx = e.clientX;
      my = e.clientY;
      dot.style.left = mx + 'px';
      dot.style.top = my + 'px';
    });

    (function cursorGlowAnim() {
      gx += (mx - gx) * 0.12;
      gy += (my - gy) * 0.12;
      glow.style.left = gx + 'px';
      glow.style.top = gy + 'px';
      requestAnimationFrame(cursorGlowAnim);
    })();

    document.querySelectorAll('a, button').forEach((el) => {
      el.addEventListener('mouseenter', () => {
        glow.style.transform = 'translate(-50%, -50%) scale(1.8)';
        glow.style.borderColor = 'rgba(0, 200, 255, 0.8)';
      });
      el.addEventListener('mouseleave', () => {
        glow.style.transform = 'translate(-50%, -50%) scale(1)';
        glow.style.borderColor = 'rgba(0, 200, 255, 0.3)';
      });
    });

    // Logout button animation and redirect
    document.getElementById('logoutBtn').addEventListener('click', function () {
      // Animate out
      this.textContent = 'Signing out…';
      this.style.pointerEvents = 'none';
      this.style.opacity = '0.5';

      setTimeout(() => {
        window.location.href = 'index.html';
      }, 700);
    });
  </script>
</body>
</html>
